version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: child-factory-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
    networks:
      - nusantara-network

  web:
    image: nginx:alpine
    container_name: child-factory-web
    restart: unless-stopped
    ports:
      - "49222:80"
    volumes:
      - .:/var/www
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - nusantara-network

  db:
    image: mysql:8.0
    container_name: child-factory-db
    restart: unless-stopped
    ports:
      - "33062:3306"
    environment:
      MYSQL_DATABASE: db_nusantara_factory
      MYSQL_ROOT_PASSWORD: root
      MYSQL_PASSWORD: root
      MYSQL_USER: nusantara
    volumes:
      - child-factory-dbdata:/var/lib/mysql
    networks:
      - nusantara-network

volumes:
  child-factory-dbdata:

networks:
  nusantara-network:
    name: nusantara-global-network
    external: true
