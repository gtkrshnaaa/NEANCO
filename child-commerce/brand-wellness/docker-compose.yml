version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: brand-wellness-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
    networks:
      - nusantara-network

  web:
    image: nginx:alpine
    container_name: brand-wellness-web
    restart: unless-stopped
    ports:
      - "49555:80"
    volumes:
      - .:/var/www
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - nusantara-network

  db:
    image: mysql:8.0
    container_name: brand-wellness-db
    restart: unless-stopped
    ports:
      - "33065:3306"
    environment:
      MYSQL_DATABASE: db_commerce_wellness
      MYSQL_ROOT_PASSWORD: root
      MYSQL_PASSWORD: root
      MYSQL_USER: nusantara
    volumes:
      - brand-wellness-dbdata:/var/lib/mysql
    networks:
      - nusantara-network

volumes:
  brand-wellness-dbdata:

networks:
  nusantara-network:
    name: nusantara-global-network
    external: true
